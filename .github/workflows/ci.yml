name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # The contract guarantee: every endpoint must work against the
      # official openai SDK, which these tests use as the client.
      - name: Integration tests (official openai SDK)
        run: bun test

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t llm-mock .

      - name: Smoke test
        run: |
          docker run -d --rm --name llm-mock -p 3000:3000 llm-mock
          timeout 30 bash -c 'until curl -sf http://localhost:3000/health; do sleep 1; done'
          curl -sf http://localhost:3000/openai/v1/models -H "Authorization: Bearer sk-mock-key-01" > /dev/null
          docker stop llm-mock
