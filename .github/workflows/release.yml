name: Release

# Publishes the Docker image to GHCR when a GitHub release is published.
# Tag releases as vX.Y.Z (e.g. v0.1.0). Authentication uses the automatic
# GITHUB_TOKEN — no manual secrets involved.
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU + Buildx enable the multi-arch (amd64 + arm64) build.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
